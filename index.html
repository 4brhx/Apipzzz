<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>أبو البزيز - مستشار التسويق العراقي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Conversations Panel -->
        <aside class="conv-panel collapsed" id="convPanel">
            <div class="conv-panel-header">
                <h2>المحادثات</h2>
                <button class="icon-btn" id="newChatBtn" title="محادثة جديدة">
                    <i class="fas fa-pen-to-square"></i>
                </button>
            </div>
            <div class="conv-list" id="convList">
                <div class="conv-item active">
                    <div class="conv-item-avatar">
                        <i class="fas fa-comment-dots"></i>
                    </div>
                    <div class="conv-item-info">
                        <span class="conv-item-title">محادثة جديدة</span>
                        <span class="conv-item-preview">ابدأ محادثة مع أبو البزيز...</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <header class="chat-header">
                <button class="toggle-panel-btn" id="togglePanel" title="المحادثات">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="chat-header-info">
                    <div class="agent-badge">
                        <div class="agent-badge-avatar">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="agent-badge-text">
                            <span class="agent-name">أبو البزيز</span>
                            <span class="agent-status"><span class="status-dot"></span>مستشار التسويق العراقي</span>
                        </div>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="header-action-btn" id="newChatBtnHeader" title="محادثة جديدة">
                        <i class="fas fa-pen-to-square"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-agent-avatar">
                        <div class="avatar-glow"></div>
                        <div class="avatar-main">
                            <i class="fas fa-store"></i>
                        </div>
                    </div>
                    <h1 class="welcome-title">أبو البزيز</h1>
                    <p class="welcome-desc">مستشارك بالتسويق العراقي - من كتاب "التسويق على طريقة أبو البزيز" للمؤلف كاظم الشمري</p>
                    <div class="welcome-tags">
                        <span class="tag"><i class="fas fa-bullhorn"></i> تسويق</span>
                        <span class="tag"><i class="fas fa-users"></i> زبائن</span>
                        <span class="tag"><i class="fas fa-tags"></i> تسعير</span>
                        <span class="tag"><i class="fas fa-chart-line"></i> نمو</span>
                    </div>
                    <div class="welcome-suggestions">
                        <button class="suggestion-chip" data-prompt="شلون أبدي تسويق لمشروعي الجديد بالعراق؟">
                            <i class="fas fa-rocket"></i>
                            <span>شلون أبدي تسويق لمشروعي؟</span>
                        </button>
                        <button class="suggestion-chip" data-prompt="شنو أفضل استراتيجية تسعير للسوق العراقي؟">
                            <i class="fas fa-tags"></i>
                            <span>أفضل استراتيجية تسعير</span>
                        </button>
                        <button class="suggestion-chip" data-prompt="شلون أخلي الزبون يرجعلي مرة ثانية؟">
                            <i class="fas fa-heart"></i>
                            <span>شلون أحافظ على الزبون؟</span>
                        </button>
                        <button class="suggestion-chip" data-prompt="شلون أتعامل ويا المنافسة بالسوق؟">
                            <i class="fas fa-shield-halved"></i>
                            <span>التعامل مع المنافسة</span>
                        </button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-wrapper" id="messagesWrapper" style="display:none;">
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-wrapper">
                <div class="input-box">
                    <textarea id="messageInput" placeholder="اسأل أبو البزيز عن التسويق العراقي..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
